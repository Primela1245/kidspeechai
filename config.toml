baseURL = "https://kidspeechai.com/"
defaultContentLanguage = "en"

[languages]
[languages.en]
locale = "en-US"
title = "Kid Speech AI — Speech Practice for Toddlers"
enableRobotsTXT = true
enableEmoji = true

[pagination]
pagerSize = 12

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
codeFences = true
lineNos = false

[params]
description = "Kid Speech AI is a fun AI speech-practice app for toddlers ages 3-5. Build vocabulary every day for $30/month with a 7-day free trial. Available on Google Play."
author = "Kid Speech AI"
tagline = "Speech Practice for Toddlers"
logo = "/images/logo.svg"
ogImage = "/images/og-default.jpg"
appPrice = "$30/month"

# SEO
googleAnalytics = ""

# Product links
playStoreUrl = ""

# Contact
supportEmail = "support@kidspeechai.com"

[taxonomies]
category = "categories"
tag = "tags"

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]

[sitemap]
changefreq = "daily"
filename = "sitemap.xml"
priority = 0.5

[permalinks]
blog = "/blog/:slug/"

[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "App"
url = "/#app"
weight = 2

[[menu.main]]
name = "Blog"
url = "/blog/"
weight = 3
